name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-asyncio
          if [ -f apps/api/requirements.txt ]; then pip install -r apps/api/requirements.txt; fi

      - name: Lint with Ruff
        run: ruff check apps/api apps/worker

      - name: Format check with Black
        run: black --check apps/api apps/worker

      - name: Run Backend Tests
        run: pytest apps/api/tests

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm install

      - name: Build frontend
        run: |
          cd apps/web
          npm run build
